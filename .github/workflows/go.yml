name: Go CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Verify dependencies
        run: go mod verify

      - name: Check formatting
        run: if [ "$(gofmt -l . | wc -l)" -gt 0 ]; then echo "Code is not formatted. Run 'go fmt ./...'"; exit 1; fi

      - name: Run go vet
        run: go vet ./...

      - name: Run automated tests
        run: go test -v -race ./...
